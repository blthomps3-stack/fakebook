<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Blake Thompson">
        <meta name="description" content="Template webpage">
        <meta name="keywords" content="html, css, web, web development, javascript">
        <link rel="icon" href="./assets/media/favicon.png?v=2"  type="image/x-icon">
        <title>Introduction to Web Development</title>
        <link rel="stylesheet" href="./assets/styles/style.css" media="all">
        <script src="./assets/scripts/app.js" defer></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body>
        <header class="flex page-header">
            <h1 id="logo">Fakebook</h1>
            <nav>
                <ul class="flex">
                    <li>Friends</li>
                    <li>Pages</li>
                    <li>Games</li>
                    <li>My ads</li>
                    <li>Settings</li>
                </ul>
            </nav>
            <img class="pfp" alt="user profile picture" src="./assets/media/favicon.png" id="usericon">
        </header>
        <dialog id="infobox" closedby="any">
            <div>
                <h4 id="name">name</h4>
                <h5 id="username">userName.id</h5>
                <h5 id="email">email</h5>
                <p id="pages">pages:</p>
                <p id="groups">groups:</p>
            </div>
            <i class="fa-solid fa-comment-dollar" id="moneyicon"></i> <!-- Turns red if user is demonetized -->
        </dialog>
        <main class="center">
            <div class="postbox">
                <form id="postform" class="flex">
                    <textarea placeholder="What's new?" name="posttext" id="textbox"></textarea>
                    <div class="flex postbuttons">
                        <div>
                            <label for="upload"><i class="fa-solid fa-image"></i></label>
                            <input type="file" accept="image" id="upload" name="postimage">
                        </div>
                        <div id="submit">Post</div>
                    </div>
                </form>
            </div>
            <section id="timeline">
                <div class="flex post" id="basePost"> <!-- example post -->
                    <header class="flex">
                        <div class="flex">
                            <img class="pfp" alt="user profile picture" src="./assets/media/favicon.png">
                            <h4 class="username">User Name</h4>
                        </div>
                        <h4 class="date">date</h4>
                    </header>
                </div>
            </section>
        </main>
    </body>
</html>
